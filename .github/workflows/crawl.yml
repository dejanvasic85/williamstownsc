name: Crawl Data

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 1-5' # Weekdays 10pm AEST
    - cron: '0 8-13 * * 6,0' # Weekends 6pm–11pm AEST (hourly)

jobs:
  crawl:
    name: Crawl clubs and fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ vars.SANITY_DATASET }}
      LOG_LEVEL: info
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome
        run: npx playwright install --with-deps chrome

      - name: Crawl clubs
        run: npm run crawl:clubs:ci
      - name: Crawl fixtures
        run: npm run crawl:fixtures:ci

      - name: Sync clubs
        run: npm run sync:clubs
      - name: Sync fixtures
        run: npm run sync:fixtures

      - name: Format code
        run: npm run format

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: feat/update-clubs-and-fixtures
          title: 'feat: update clubs and fixtures'
          body: |
            This is an automated pull request to update clubs and fixtures data.
          commit-message: 'feat: update clubs and fixtures data'
          labels: 'content'
          token: ${{ secrets.ACTIONS_TOKEN }}

      - name: Enable auto-merge for PR
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: gh pr merge --auto --squash ${{ steps.cpr.outputs.pull-request-number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
