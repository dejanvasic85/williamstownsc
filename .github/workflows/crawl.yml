name: Crawl Data

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      chunk_size:
        description: 'Teams per crawl job'
        default: '4'
        required: false
  schedule:
    - cron: '0 12 * * 1-5' # Weekdays 10pm AEST
    - cron: '0 8-13 * * 6,0' # Weekends 6pm–11pm AEST (hourly)

env:
  NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
  NEXT_PUBLIC_SANITY_DATASET: ${{ vars.SANITY_DATASET }}
  LOG_LEVEL: info

jobs:
  setup:
    name: Compute team chunks
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.chunk.outputs.chunks }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - id: chunk
        name: Compute chunks
        run: |
          SIZE=${{ github.event.inputs.chunk_size || '4' }}
          echo "chunks=$(pnpm exec tsx bin/wsc.ts list chunks --size $SIZE)" >> $GITHUB_OUTPUT

  crawl-clubs:
    name: Crawl clubs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chrome-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Chrome
        run: pnpm exec playwright install --with-deps chrome
      - name: Crawl clubs
        run: pnpm run crawl:clubs:ci
      - name: Sync clubs
        run: pnpm run sync:clubs
      - uses: actions/upload-artifact@v4
        with:
          name: clubs-data
          path: data/clubs/

  crawl:
    name: Crawl chunk ${{ strategy.job-index }}
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.setup.outputs.chunks) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chrome-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Chrome
        run: pnpm exec playwright install --with-deps chrome

      - name: Crawl fixtures for chunk
        run: xvfb-run --auto-servernum pnpm exec tsx bin/wsc.ts crawl fixtures --team ${{ join(matrix.chunk, ' --team ') }}

      - name: Sync fixtures and tables for chunk
        run: |
          mkdir -p tmp/crawl/matches tmp/crawl/table
          for team in ${{ join(matrix.chunk, ' ') }}; do
            pnpm exec tsx bin/wsc.ts sync fixtures --team "$team"
            pnpm exec tsx bin/wsc.ts sync table --team "$team"
            if [[ -f "data/matches/$team.json" ]]; then
              cp "data/matches/$team.json" "tmp/crawl/matches/$team.json"
            else
              echo "warn: missing matches file for team=$team"
            fi

            if [[ -f "data/table/$team.json" ]]; then
              cp "data/table/$team.json" "tmp/crawl/table/$team.json"
            else
              echo "warn: missing table file for team=$team"
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: matches-chunk-${{ strategy.job-index }}
          path: tmp/crawl/matches/
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        with:
          name: table-chunk-${{ strategy.job-index }}
          path: tmp/crawl/table/
          if-no-files-found: warn

  commit:
    name: Create PR
    needs: [crawl-clubs, crawl]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          pattern: clubs-data
          path: data/clubs/
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: matches-chunk-*
          path: data/matches/
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: table-chunk-*
          path: data/table/
          merge-multiple: true
      - name: Format code
        run: pnpm run format
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: feat/update-clubs-and-fixtures
          title: 'feat: update clubs and fixtures data'
          body: |
            This is an automated pull request to update clubs and fixtures data.
          commit-message: 'feat: update clubs and fixtures data'
          labels: 'content'
          token: ${{ secrets.ACTIONS_TOKEN }}
      - name: Enable auto-merge for PR
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: gh pr merge --auto --squash ${{ steps.cpr.outputs.pull-request-number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
