name: Build Crawler Image

on:
  push:
    branches: [main]
    paths:
      - 'docker/crawler/Dockerfile'
      - '.mise.toml'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  build:
    name: Build and push crawler image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/crawler
          push: true
          tags: |
            ghcr.io/dejanvasic85/williamstownsc-crawler:latest
            ghcr.io/dejanvasic85/williamstownsc-crawler:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
